<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Gemini Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="chat-panel">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Gemini 2.5 Flash</p>
          <h1>Basic Gemini Chat</h1>
        </div>
        <div class="header-actions">
          <button class="clear-btn" id="memoryLogBtn" type="button">Memory Log</button>
          <button class="clear-btn" id="clearMemoryBtn" type="button">Clear Memory</button>
          <button class="clear-btn" id="clearBtn" type="button">Clear</button>
        </div>
      </header>

      <div class="chat-box" id="chatBox" aria-live="polite">
        <div class="message bot">
          Hi. Ask me anything, and I will keep it clear and useful.
        </div>
      </div>

      <form class="chat-form" id="chatForm">
        <input
          id="chatInput"
          type="text"
          placeholder="Type your message..."
          autocomplete="off"
        >
        <button id="sendBtn" type="submit">Send</button>
      </form>
    </section>
  </main>

  <div class="memory-modal" id="memoryModal" hidden>
    <div class="memory-window" role="dialog" aria-modal="true" aria-labelledby="memoryTitle">
      <header class="memory-window-header">
        <h2 id="memoryTitle">Local Memory Log</h2>
        <button class="memory-close" id="closeMemoryBtn" type="button" aria-label="Close memory log">×</button>
      </header>
      <pre class="memory-log" id="memoryLogOutput"></pre>
    </div>
  </div>

  <script src="chat_api.js"></script>
  <script src="script.js"></script>
</body>
</html>
